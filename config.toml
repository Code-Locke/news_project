# news_at_12 - Configuration File
# All application settings and feed configuration in one place

# Application Settings 

[settings]
# Database and output files
db_file = "headlines.db"
html_output = "headlines.html"
json_output = "headlines.json"

# Logging
log_file = "news_at_12.log"
error_log_file = "news_errors.log"
log_max_bytes = 1_000_000      # Rotate logs at 1 MB
log_backup_count = 3            # Keep 3 rotated copies

# Fetching behavior
summary_limit = 300             # Max characters stored/shown per summary
max_workers = 10                # Max concurrent fetch threads
fetch_timeout = 15              # Timeout per feed (seconds)

# Browser behavior
auto_open_browser = true        # Open HTML in browser after run


# News Feeds

